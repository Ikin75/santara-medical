<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Kotak P3K - Santara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">
    <div
      class="bg-white max-w-md w-full rounded-[32px] shadow-2xl p-10 relative overflow-hidden"
    >
      <div
        class="absolute -top-16 -right-16 w-40 h-40 bg-orange-500/20 blur-3xl rounded-full"
      ></div>

      <div class="text-center mb-8 relative z-10">
        <div
          class="w-20 h-20 bg-orange-50 rounded-2xl mx-auto flex items-center justify-center text-4xl mb-4 border border-orange-100"
        >
          🚑
        </div>
        <h1 class="text-3xl font-black text-gray-900 mb-2">Portal P3K</h1>
        <p class="text-gray-500 text-sm">
          Pilih tindakan yang ingin Anda lakukan untuk kotak P3K ini.
        </p>
      </div>

      <div
        class="bg-gray-50 rounded-2xl p-5 mb-8 border border-gray-100 text-sm text-center relative z-10"
      >
        <p
          class="text-gray-400 font-bold uppercase tracking-wider mb-1"
          id="infoCompany"
        >
          Memuat...
        </p>
        <p class="text-xl font-black text-orange-600 mb-1" id="infoBox">-</p>
        <p class="text-gray-600 font-medium" id="infoLocation">-</p>
      </div>

      <div class="space-y-4 relative z-10">
        <a
          id="btnLapor"
          href="#"
          class="w-full flex items-center gap-4 bg-white border-2 border-orange-500 text-orange-600 p-4 rounded-2xl hover:bg-orange-50 transition shadow-sm group"
        >
          <span class="text-3xl group-hover:scale-110 transition">🩹</span>
          <div class="text-left">
            <h3 class="font-bold text-lg">Lapor Pemakaian</h3>
            <p class="text-xs text-gray-500 font-medium">
              Jika Anda mengambil isi kotak.
            </p>
          </div>
        </a>

        <a
          id="btnInspeksi"
          href="#"
          class="w-full flex items-center gap-4 bg-black text-white p-4 rounded-2xl hover:bg-gray-800 transition shadow-lg group"
        >
          <span class="text-3xl group-hover:scale-110 transition">📋</span>
          <div class="text-left">
            <h3 class="font-bold text-lg">Inspeksi Rutin</h3>
            <p class="text-xs text-gray-400 font-medium">
              Khusus petugas K3 (Perlu PIN).
            </p>
          </div>
        </a>
      </div>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        // Ambil data URL dari hasil scan QR
        const params = new URLSearchParams(window.location.search);
        const company = params.get("company");
        const location = params.get("location");
        const box = params.get("box");

        // Tampilkan info
        if (company) document.getElementById("infoCompany").innerText = company;
        if (box) document.getElementById("infoBox").innerText = box;
        if (location)
          document.getElementById("infoLocation").innerText = location;

        // Teruskan data URL tersebut ke halaman selanjutnya
        const queryString = window.location.search;
        document.getElementById("btnLapor").href =
          "lapor-p3k.html" + queryString;
        document.getElementById("btnInspeksi").href = "p3k.html" + queryString;
      });
    </script>
  </body>
</html>
