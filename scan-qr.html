<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan QR P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
      /* Styling untuk merapikan UI bawaan scanner */
      #reader {
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
        border: 4px solid #f97316;
        background: white;
        padding: 16px;
      }
      #reader button {
        background-color: #f97316;
        color: white;
        padding: 10px 20px;
        border-radius: 12px;
        font-weight: bold;
        margin: 5px;
        cursor: pointer;
        border: none;
        transition: 0.3s;
      }
      #reader button:hover {
        background-color: #ea580c;
      }
      #reader a {
        color: #f97316;
        font-weight: bold;
        text-decoration: none;
      }
      #reader select {
        padding: 8px;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 10px;
        width: 100%;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500">Santara</span> Scan
        </h1>
        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <section class="py-16 px-6">
      <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
          <h2 class="text-4xl font-black mb-4">Scan QR Kotak P3K</h2>
          <p class="text-gray-500 text-lg mb-10">
            Gunakan kamera atau upload foto QR Code.
          </p>

          <div id="reader" class="mx-auto shadow-md"></div>

          <div id="qrResult"></div>
        </div>
      </div>
    </section>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // MENGGUNAKAN Html5QrcodeScanner (Lebih stabil dari Html5Qrcode biasa)
        const html5QrcodeScanner = new Html5QrcodeScanner(
          "reader",
          {
            fps: 10,
            qrbox: { width: 250, height: 250 },
            // Fokus hanya pada format QR Code agar cepat
            formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
            // Mengizinkan scan via kamera DAN via file upload
            supportedScanTypes: [
              Html5QrcodeScanType.SCAN_TYPE_CAMERA,
              Html5QrcodeScanType.SCAN_TYPE_FILE,
            ],
          },
          false, // Verbose log dimatikan
        );

        // RENDER UI & JALANKAN LOGIKA
        html5QrcodeScanner.render(
          // KETIKA BERHASIL (Kamera atau Foto)
          (decodedText, decodedResult) => {
            console.log("HASIL:", decodedText);

            const resultEl = document.getElementById("qrResult");
            if (resultEl) {
              resultEl.innerHTML = `
                <div class="mt-6 bg-green-100 text-green-700 p-4 rounded-2xl font-bold break-all border border-green-300 shadow-md">
                  ✅ QR Berhasil Terbaca: <br> ${decodedText}
                </div>
              `;
            }

            // Hentikan scanner setelah sukses membaca
            html5QrcodeScanner.clear();

            // Redirect ke link hasil scan
            setTimeout(() => {
              if (
                decodedText.startsWith("http://") ||
                decodedText.startsWith("https://")
              ) {
                window.location.href = decodedText;
              }
            }, 500);
          },
          // KETIKA GAGAL / SEDANG MENCARI (Abaikan)
          (errorMessage) => {
            // Kosongkan agar konsol tidak error saat kamera mencari fokus
          },
        );
      });
    </script>
  </body>
</html>
