<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scan QR P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
    <style>
      #reader video {
        width: 100% !important;
        height: auto !important;
        object-fit: cover;
        border-radius: 24px;
        filter: contrast(1.05) sharpen(1);
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->

    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500"> Santara </span>

          Scan QR
        </h1>

        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <!-- CONTENT -->

    <section class="py-16 px-6">
      <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
          <h2 class="text-5xl font-black mb-4">Scan QR Kotak P3K</h2>

          <p class="text-gray-500 text-lg mb-10">
            Arahkan kamera ke QR Code kotak P3K.
          </p>

          <div
            id="reader"
            class="w-full max-w-xl mx-auto overflow-hidden rounded-3xl shadow-2xl border-4 border-orange-500"
          ></div>
          <div id="qrResult"></div>
        </div>
      </div>
    </section>

    <script>
      const html5QrCode = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then((devices) => {
        if (devices && devices.length) {
          console.log(devices);

          let cameraId = devices[0].id;

          devices.forEach((device) => {
            const name = device.label.toLowerCase();

            // pilih kamera belakang terbaik

            if (
              name.includes("back") ||
              name.includes("rear") ||
              name.includes("camera2")
            ) {
              cameraId = device.id;
            }
          });

          html5QrCode.start(
            cameraId,

            {
              fps: 10,

              qrbox: {
                width: 280,
                height: 280,
              },

              aspectRatio: 1.777,

              disableFlip: true,
            },

            // SUCCESS
            (decodedText) => {
              console.log("HASIL:", decodedText);

              // tampilkan hasil
              const resultEl = document.getElementById("qrResult");

              if (resultEl) {
                resultEl.innerHTML = `
      <div class="mt-6 bg-green-100 text-green-700 p-4 rounded-2xl font-bold break-all">
        QR Terdeteksi:
        <br>
        ${decodedText}
      </div>
    `;
              }

              // STOP scanner
              html5QrCode.stop().then(() => {
                // redirect sedikit delay
                setTimeout(() => {
                  // cek apakah URL valid
                  if (
                    decodedText.startsWith("http://") ||
                    decodedText.startsWith("https://")
                  ) {
                    window.location.href = decodedText;
                  }
                }, 500);
              });
            },

            // ERROR
            (errorMessage) => {},
          );
        }
      });
    </script>
  </body>
</html>
