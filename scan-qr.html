<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scan QR P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
    <style>
      #reader video {
        width: 100% !important;
        height: auto !important;
        object-fit: cover;
        border-radius: 24px;
        filter: contrast(1.05) sharpen(1);
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->

    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500"> Santara </span>

          Scan QR
        </h1>

        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <!-- CONTENT -->

    <section class="py-16 px-6">
      <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
          <h2 class="text-5xl font-black mb-4">Scan QR Kotak P3K</h2>

          <p class="text-gray-500 text-lg mb-10">
            Arahkan kamera ke QR Code kotak P3K.
          </p>

          <div
            id="reader"
            class="w-full max-w-xl mx-auto overflow-hidden rounded-3xl shadow-2xl border-4 border-orange-500"
          ></div>
          <div id="qrResult"></div>
        </div>
      </div>
    </section>

    <script>
      // Pastikan DOM sudah siap sebelum memanggil elemen
      document.addEventListener("DOMContentLoaded", () => {
        const html5QrCode = new Html5Qrcode("reader");

        // Meminta izin akses kamera
        Html5Qrcode.getCameras()
          .then((devices) => {
            if (devices && devices.length) {
              console.log("Kamera ditemukan:", devices);

              let cameraId = devices[0].id;

              // Pilih kamera belakang terbaik
              devices.forEach((device) => {
                const name = device.label.toLowerCase();
                if (
                  name.includes("back") ||
                  name.includes("rear") ||
                  name.includes("environment") || // tambahan kata kunci untuk mobile
                  name.includes("camera2")
                ) {
                  cameraId = device.id;
                }
              });

              // Mulai kamera
              html5QrCode
                .start(
                  cameraId,
                  {
                    fps: 10,
                    qrbox: { width: 250, height: 250 }, // Disesuaikan agar lebih fleksibel
                    // aspectRatio dihapus agar otomatis menyesuaikan kamera perangkat
                    disableFlip: false,
                  },
                  // SUCCESS CALL
                  (decodedText) => {
                    console.log("HASIL:", decodedText);

                    const resultEl = document.getElementById("qrResult");
                    if (resultEl) {
                      resultEl.innerHTML = `
                      <div class="mt-6 bg-green-100 text-green-700 p-4 rounded-2xl font-bold break-all border border-green-300">
                        ✅ QR Terdeteksi: <br> ${decodedText}
                      </div>
                    `;
                    }

                    // Hentikan scanner setelah berhasil
                    html5QrCode.stop().then(() => {
                      setTimeout(() => {
                        if (
                          decodedText.startsWith("http://") ||
                          decodedText.startsWith("https://")
                        ) {
                          window.location.href = decodedText;
                        }
                      }, 500);
                    });
                  },
                  // ERROR CALL (Abaikan frame yang gagal terbaca)
                  (errorMessage) => {
                    // Tidak perlu di-log agar console tidak penuh
                  },
                )
                .catch((err) => {
                  // TANGKAP ERROR START KAMERA
                  console.error("Gagal memulai kamera:", err);
                  alert(
                    "Gagal memuat kamera. Pastikan rasio kamera didukung atau coba muat ulang halaman.",
                  );
                });
            } else {
              alert("Tidak ada kamera yang terdeteksi di perangkat ini.");
            }
          })
          .catch((err) => {
            // TANGKAP ERROR IZIN DITOLAK ATAU BUKAN HTTPS/LOCALHOST
            console.error("Error mendapatkan akses kamera:", err);
            alert(
              "Akses kamera ditolak! Pastikan Anda mengizinkan akses kamera dan membuka halaman ini melalui Live Server (localhost) atau HTTPS.",
            );
          });
      });
    </script>
  </body>
</html>
