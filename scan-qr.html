<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scan QR P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500">Santara</span> Scan
        </h1>
        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <section class="py-16 px-6">
      <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
          <h2 class="text-4xl font-black mb-4">Scan QR Kotak P3K</h2>
          <p class="text-gray-500 text-lg mb-10">
            Jepret foto QR Code menggunakan kamera bawaan HP Anda agar hasil
            lebih tajam.
          </p>

          <img
            id="imagePreview"
            class="hidden w-full max-w-sm mx-auto rounded-3xl border-4 border-orange-500 mb-8 object-cover shadow-lg"
            alt="Preview QR"
          />

          <div
            id="loadingText"
            class="hidden text-orange-500 font-bold text-xl mb-6 animate-pulse"
          >
            ⏳ Sedang membaca QR Code...
          </div>

          <input
            type="file"
            id="cameraInput"
            accept="image/*"
            capture="environment"
            class="hidden"
          />
          <input
            type="file"
            id="galleryInput"
            accept="image/*"
            class="hidden"
          />

          <div class="flex flex-col gap-4 max-w-sm mx-auto">
            <button
              onclick="document.getElementById('cameraInput').click()"
              class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-5 rounded-2xl text-lg shadow-xl transition-all transform hover:scale-105 flex items-center justify-center gap-3"
            >
              <span class="text-2xl">📸</span> Buka Kamera HP
            </button>

            <button
              onclick="document.getElementById('galleryInput').click()"
              class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-4 rounded-2xl text-lg shadow-md transition-all flex items-center justify-center gap-3"
            >
              <span class="text-2xl">🖼️</span> Pilih dari Galeri
            </button>
          </div>

          <div id="qrResult" class="mt-8"></div>

          <div id="reader-placeholder" class="hidden"></div>
        </div>
      </div>
    </section>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Inisialisasi mesin AI pembaca QR
        const html5QrCode = new Html5Qrcode("reader-placeholder");

        const cameraInput = document.getElementById("cameraInput");
        const galleryInput = document.getElementById("galleryInput");
        const imagePreview = document.getElementById("imagePreview");
        const loadingText = document.getElementById("loadingText");
        const resultEl = document.getElementById("qrResult");

        // Fungsi Utama untuk membaca file foto
        function processImage(event) {
          if (event.target.files.length === 0) return;
          const file = event.target.files[0];

          // 1. Tampilkan foto yang baru saja dijepret
          imagePreview.src = URL.createObjectURL(file);
          imagePreview.classList.remove("hidden");

          // 2. Tampilkan status loading & bersihkan hasil lama
          loadingText.classList.remove("hidden");
          resultEl.innerHTML = "";

          // 3. Mesin mulai membaca foto
          html5QrCode
            .scanFile(file, true)
            .then((decodedText) => {
              // Jika SUKSES terbaca
              loadingText.classList.add("hidden");
              resultEl.innerHTML = `
                <div class="bg-green-100 text-green-700 p-5 rounded-2xl font-bold break-all border border-green-300 shadow-md">
                  ✅ QR Ditemukan: <br> <span class="text-sm font-normal">${decodedText}</span>
                </div>
              `;

              // Langsung pindah ke link tujuan setelah 1 detik
              setTimeout(() => {
                if (
                  decodedText.startsWith("http://") ||
                  decodedText.startsWith("https://")
                ) {
                  window.location.href = decodedText;
                }
              }, 1000);
            })
            .catch((err) => {
              // Jika GAGAL terbaca (Foto buram/Tidak ada QR)
              loadingText.classList.add("hidden");
              resultEl.innerHTML = `
                <div class="bg-red-100 text-red-700 p-5 rounded-2xl font-bold border border-red-300 shadow-md">
                  ❌ QR tidak terbaca. Pastikan foto fokus dan tidak silau.
                </div>
              `;
            });

          // Reset input file agar bisa memfoto ulang berkali-kali
          event.target.value = "";
        }

        // Pasang sensor ke kedua tombol input
        cameraInput.addEventListener("change", processImage);
        galleryInput.addEventListener("change", processImage);
      });
    </script>
  </body>
</html>
