<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Scan QR P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->

    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500"> Santara </span>

          Scan QR
        </h1>

        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <!-- CONTENT -->

    <section class="py-16 px-6">
      <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-10 text-center">
          <h2 class="text-5xl font-black mb-4">Scan QR Kotak P3K</h2>

          <p class="text-gray-500 text-lg mb-10">
            Arahkan kamera ke QR Code kotak P3K.
          </p>

          <div id="reader" class="rounded-3xl overflow-hidden"></div>
        </div>
      </div>
    </section>

    <script>
      function onScanSuccess(decodedText) {
        window.location.href = decodedText;
      }

      const html5QrCode = new Html5Qrcode("reader");

      Html5Qrcode.getCameras()
        .then((devices) => {
          if (devices && devices.length) {
            html5QrCode.start(
              { facingMode: "environment" },

              {
                fps: 10,
                qrbox: 250,
              },

              onScanSuccess,
            );
          }
        })
        .catch((err) => {
          alert("Kamera tidak tersedia");
        });
    </script>
  </body>
</html>
