<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P3K Inspection - Santara Medical</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
        <h1 class="text-3xl font-extrabold">
          <span class="text-orange-500">Santara</span> P3K
        </h1>
        <div class="flex gap-3">
          <a
            href="index.html"
            class="bg-gray-800 hover:bg-gray-700 transition px-5 py-3 rounded-xl font-semibold hidden sm:block"
            >Home</a
          >
          <button
            onclick="logoutPetugas()"
            class="bg-red-500 hover:bg-red-600 transition px-5 py-3 rounded-xl font-semibold"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <section class="py-12 px-6">
      <div class="max-w-5xl mx-auto">
        <div class="mb-10">
          <h2 class="text-5xl font-black mb-4">Form Pemeriksaan P3K</h2>
          <p class="text-gray-500 text-lg">
            Pemeriksaan kelengkapan kotak P3K perusahaan.
          </p>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl p-10">
          <form id="p3kForm" class="space-y-10">
            <div class="grid md:grid-cols-2 gap-6 items-end">
              <div>
                <label class="font-semibold mb-3 block text-gray-700"
                  >Nama Perusahaan</label
                >
                <input
                  type="text"
                  id="company"
                  readonly
                  class="w-full border border-gray-200 rounded-2xl p-4 bg-gray-100 cursor-not-allowed focus:outline-none"
                  placeholder="Terisi otomatis dari QR"
                />
              </div>
              <div>
                <label class="font-semibold mb-3 block text-gray-700"
                  >Nama Petugas</label
                >
                <input
                  type="text"
                  id="officer"
                  readonly
                  class="w-full border border-gray-200 rounded-2xl p-4 bg-gray-100 cursor-not-allowed focus:outline-none"
                  placeholder="Memuat nama..."
                />
              </div>
              <div>
                <label class="font-semibold mb-3 block text-gray-700"
                  >Lokasi</label
                >
                <input
                  type="text"
                  id="location"
                  readonly
                  class="w-full border border-gray-200 rounded-2xl p-4 bg-gray-100 cursor-not-allowed focus:outline-none"
                  placeholder="Terisi otomatis dari QR"
                />
              </div>

              <div class="flex gap-4">
                <div class="flex-1">
                  <label class="font-semibold mb-3 block text-gray-700"
                    >Nomor Kotak</label
                  >
                  <input
                    type="text"
                    id="box"
                    readonly
                    class="w-full border border-gray-200 rounded-2xl p-4 bg-gray-100 cursor-not-allowed focus:outline-none"
                    placeholder="Terisi otomatis dari QR"
                  />
                </div>
                <a
                  href="scan-qr.html"
                  class="bg-green-500 hover:bg-green-600 text-white px-6 rounded-2xl font-bold shadow-lg transition transform hover:-translate-y-1 flex items-center justify-center gap-2 h-[60px] self-end shrink-0"
                >
                  <span>📷</span> <span class="hidden sm:inline">Scan QR</span>
                </a>
              </div>
            </div>

            <div>
              <h3 class="text-3xl font-bold mb-8">Checklist Isi P3K</h3>
              <div class="overflow-auto">
                <div
                  id="summaryBox"
                  class="grid grid-cols-3 gap-6 mb-10 min-w-[600px]"
                >
                  <div class="bg-green-50 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-gray-500">Aman</h3>
                    <p
                      id="safeCount"
                      class="text-4xl font-black text-green-600 mt-2"
                    >
                      0
                    </p>
                  </div>
                  <div class="bg-yellow-50 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-gray-500">Kurang</h3>
                    <p
                      id="lessCount"
                      class="text-4xl font-black text-yellow-600 mt-2"
                    >
                      0
                    </p>
                  </div>
                  <div class="bg-red-50 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-gray-500">Expired</h3>
                    <p
                      id="expiredCount"
                      class="text-4xl font-black text-red-600 mt-2"
                    >
                      0
                    </p>
                  </div>
                </div>

                <div
                  class="bg-white rounded-2xl p-6 shadow mb-10 border border-gray-100 min-w-[600px]"
                >
                  <div class="flex justify-between mb-3">
                    <h3 class="font-bold text-lg">Kelengkapan Kotak P3K</h3>
                    <span id="percentageText" class="font-bold text-orange-500"
                      >0%</span
                    >
                  </div>
                  <div
                    class="w-full bg-gray-200 h-5 rounded-full overflow-hidden"
                  >
                    <div
                      id="progressBar"
                      class="bg-orange-500 h-5 rounded-full transition-all duration-500"
                      style="width: 0%"
                    ></div>
                  </div>
                </div>

                <div
                  id="warningBox"
                  class="hidden mb-8 rounded-2xl border border-red-200 bg-red-50 p-6 min-w-[600px]"
                >
                  <h3 class="text-2xl font-black text-red-600 mb-4">
                    ⚠ Warning Inspection
                  </h3>
                  <div id="warningContent" class="space-y-3 text-lg"></div>
                </div>

                <table class="w-full border-collapse min-w-[800px]">
                  <thead>
                    <tr class="bg-orange-500 text-white">
                      <th class="p-4 text-left rounded-tl-xl">Item</th>
                      <th class="p-4 text-center">Standar</th>
                      <th class="p-4 text-left">Aktual</th>
                      <th class="p-4 text-center">Bulan Lalu</th>
                      <th class="p-4 text-center">Selisih</th>
                      <th class="p-4 text-left">Expired</th>
                      <th class="p-4 text-center rounded-tr-xl">Status</th>
                    </tr>
                  </thead>
                  <tbody id="tableBody"></tbody>
                </table>
              </div>
            </div>

            <div class="space-y-8 pt-8 border-t border-gray-100 mt-10">
              <div>
                <label class="font-semibold mb-3 block text-gray-700"
                  >Catatan Pemeriksaan</label
                >
                <textarea
                  id="note"
                  rows="4"
                  class="w-full border border-gray-200 rounded-2xl p-4 focus:ring-2 focus:ring-orange-500 focus:outline-none transition"
                  placeholder="Tambahkan catatan jika ada..."
                ></textarea>
              </div>

              <div>
                <label class="font-bold mb-3 block text-gray-700"
                  >Foto Kondisi Kotak P3K</label
                >
                <input
                  type="file"
                  id="photo"
                  accept="image/*"
                  class="w-full border border-gray-200 rounded-2xl p-4 bg-white focus:ring-2 focus:ring-orange-500 focus:outline-none transition file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100"
                />
                <img
                  id="preview"
                  class="hidden mt-6 rounded-2xl shadow-lg max-h-64 object-cover border-4 border-white"
                />
              </div>
            </div>

            <div
              class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mt-12 bg-gray-50 p-6 rounded-3xl border border-gray-100"
            >
              <button
                type="button"
                onclick="generatePDF()"
                class="flex items-center justify-center gap-2 bg-white border-2 border-gray-800 text-gray-800 py-3.5 px-4 rounded-xl font-bold hover:bg-gray-800 hover:text-white transition shadow-sm"
              >
                📄 <span>Generate PDF</span>
              </button>
              <a
                href="warning-p3k.html"
                class="flex items-center justify-center gap-2 bg-red-100 text-red-600 py-3.5 px-4 rounded-xl font-bold hover:bg-red-500 hover:text-white transition shadow-sm"
                >🚨 <span>Warning</span></a
              >
              <a
                href="history-p3k.html"
                class="flex items-center justify-center gap-2 bg-sky-100 text-sky-700 py-3.5 px-4 rounded-xl font-bold hover:bg-sky-500 hover:text-white transition shadow-sm"
                >📋 <span>History</span></a
              >
              <a
                href="dashboard-p3k.html"
                class="flex items-center justify-center gap-2 bg-purple-100 text-purple-700 py-3.5 px-4 rounded-xl font-bold hover:bg-purple-500 hover:text-white transition shadow-sm"
                >📊 <span>Dashboard</span></a
              >
            </div>

            <div class="pt-4">
              <button
                type="submit"
                class="w-full bg-orange-500 hover:bg-orange-600 transition-all duration-300 text-white py-5 rounded-2xl text-xl font-extrabold shadow-xl shadow-orange-500/30 flex items-center justify-center gap-3"
              >
                ✅ <span>Simpan Pemeriksaan</span>
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      // 1. SISTEM KEAMANAN (LOGIN CEK & CEGAH ENTER)
      const petugasLogin = localStorage.getItem("santara_petugas");
      if (!petugasLogin) {
        alert("Akses Ditolak! Anda harus login terlebih dahulu.");
        window.location.href = "login-p3k.html";
      }

      function logoutPetugas() {
        localStorage.removeItem("santara_petugas");
        window.location.href = "login-p3k.html";
      }

      // Mencegah form tersubmit otomatis saat pencet tombol Enter
      document
        .getElementById("p3kForm")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter" && e.target.tagName !== "TEXTAREA") {
            e.preventDefault();
          }
        });

      // 2. DATA ITEM P3K
      const items = [
        { name: "Kasa Steril", standard: 20 },
        { name: "Perban 5cm", standard: 2 },
        { name: "Perban 10cm", standard: 2 },
        { name: "Plester Cepat", standard: 10 },
        { name: "Kapas", standard: 1 },
        { name: "Gunting", standard: 1 },
        { name: "Masker", standard: 1 },
        { name: "Sarung Tangan", standard: 2 },
        { name: "Alkohol 70%", standard: 1 },
        { name: "Povidone Iodine", standard: 1 },
      ];

      const tableBody = document.getElementById("tableBody");
      let lastInspection = {};

      // 3. RENDER TABEL
      items.forEach((item, index) => {
        tableBody.innerHTML += `
          <tr class="border-b hover:bg-gray-50 transition">
            <td class="p-4 font-medium text-gray-800">${item.name}</td>
            <td class="p-4 text-center font-bold text-gray-500">${item.standard}</td>
            <td class="p-4">
              <input type="number" max="${item.standard}" id="actual-${index}" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-orange-500 outline-none" value="${item.standard}"/>
            </td>
            <td class="p-4 text-center"><span id="last-${index}" class="font-semibold text-gray-500">0</span></td>
            <td class="p-4 text-center"><span id="diff-${index}" class="font-bold">0</span></td>
            <td class="p-4"><input type="date" id="expired-${index}" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-orange-500 outline-none"/></td>
            <td class="p-4 text-center"><span id="status-${index}" class="px-4 py-2 rounded-xl bg-green-100 text-green-600 font-semibold inline-block w-full">Aman</span></td>
          </tr>
        `;
      });

      // 4. LOGIC PERHITUNGAN TABEL
      setTimeout(() => {
        items.forEach((item, index) => {
          const actualInput = document.getElementById(`actual-${index}`);
          const expiredInput = document.getElementById(`expired-${index}`);
          const status = document.getElementById(`status-${index}`);

          function checkStatus() {
            let actual = parseInt(actualInput.value) || 0;
            if (actual > item.standard) {
              actualInput.value = item.standard;
              actual = item.standard;
            }

            const expiredDate = new Date(expiredInput.value);
            const today = new Date();
            status.className =
              "px-4 py-2 rounded-xl font-semibold inline-block w-full";

            if (expiredInput.value && expiredDate < today) {
              status.innerText = "Expired";
              status.classList.add("bg-red-100", "text-red-600");
            } else if (actual < item.standard) {
              status.innerText = "Kurang";
              status.classList.add("bg-yellow-100", "text-yellow-600");
            } else {
              status.innerText = "Aman";
              status.classList.add("bg-green-100", "text-green-600");
            }
            updateSummary();
            updateWarning();
            updateCompare(index, actual);
          }

          function updateCompare(index, actual) {
            const lastMonth = parseInt(lastInspection[item.name]) || 0;
            document.getElementById(`last-${index}`).innerText = lastMonth;
            const diff = actual - lastMonth;
            const diffEl = document.getElementById(`diff-${index}`);
            diffEl.innerText = diff > 0 ? "+" + diff : diff;
            diffEl.className = "font-bold";
            if (diff < 0) diffEl.classList.add("text-red-500");
            else if (diff > 0) diffEl.classList.add("text-green-500");
            else diffEl.classList.add("text-gray-400");
          }

          function updateSummary() {
            let safe = 0,
              less = 0,
              expired = 0;
            items.forEach((_, idx) => {
              const statusText = document.getElementById(
                `status-${idx}`,
              ).innerText;
              if (statusText === "Aman") safe++;
              else if (statusText === "Kurang") less++;
              else if (statusText === "Expired") expired++;
            });
            document.getElementById("safeCount").innerText = safe;
            document.getElementById("lessCount").innerText = less;
            document.getElementById("expiredCount").innerText = expired;
            const percent = Math.round((safe / items.length) * 100);
            document.getElementById("percentageText").innerText = percent + "%";
            document.getElementById("progressBar").style.width = percent + "%";
          }

          function updateWarning() {
            let less = 0,
              expired = 0;
            items.forEach((_, idx) => {
              const statusText = document.getElementById(
                `status-${idx}`,
              ).innerText;
              if (statusText === "Kurang") less++;
              if (statusText === "Expired") expired++;
            });
            const warningBox = document.getElementById("warningBox");
            const warningContent = document.getElementById("warningContent");
            warningContent.innerHTML = "";
            if (less > 0 || expired > 0) {
              warningBox.classList.remove("hidden");
              if (less > 0)
                warningContent.innerHTML += `<div class="bg-yellow-100 text-yellow-700 px-5 py-4 rounded-xl font-semibold">⚠ ${less} item kurang dari standar</div>`;
              if (expired > 0)
                warningContent.innerHTML += `<div class="bg-red-100 text-red-700 px-5 py-4 rounded-xl font-semibold">🚨 ${expired} item expired</div>`;
            } else {
              warningBox.classList.add("hidden");
            }
          }

          actualInput.addEventListener("input", checkStatus);
          expiredInput.addEventListener("change", checkStatus);
          checkStatus();
        });
      }, 100);

      // 5. ISI OTOMATIS DATA PETUGAS & QR URL
      window.addEventListener("DOMContentLoaded", () => {
        // Kunci dan isi nama petugas
        const officerInput = document.getElementById("officer");
        officerInput.value = petugasLogin;

        // Ambil data dari Scan QR
        const params = new URLSearchParams(window.location.search);
        const companyName = params.get("company");
        const locationName = params.get("location");
        const box = params.get("box");

        if (companyName) document.getElementById("company").value = companyName;
        if (locationName)
          document.getElementById("location").value = locationName;
        if (box) {
          document.getElementById("box").value = box;
          fetch(
            "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec?box=" +
              box,
          )
            .then((res) => res.json())
            .then((history) => {
              history.forEach((row) => {
                lastInspection[row.item] = row.actual;
              });
              items.forEach((item, index) => {
                const actual = document.getElementById(`actual-${index}`).value;
                const lastMonth = parseInt(lastInspection[item.name]) || 0;
                document.getElementById(`last-${index}`).innerText = lastMonth;
                const diff = actual - lastMonth;
                const diffEl = document.getElementById(`diff-${index}`);
                diffEl.innerText = diff > 0 ? "+" + diff : diff;
                diffEl.className =
                  diff < 0
                    ? "font-bold text-red-500"
                    : diff > 0
                      ? "font-bold text-green-500"
                      : "font-bold text-gray-400";
              });
            })
            .catch((err) => console.log("Gagal memuat history:", err));
        }
      });

      // 6. UPLOAD FOTO PREVIEW
      const photoInput = document.getElementById("photo");
      const preview = document.getElementById("preview");
      photoInput.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          preview.src = URL.createObjectURL(file);
          preview.classList.remove("hidden");
        }
      });
      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = (error) => reject(error);
        });
      }

      // 7. FUNGSI SIMPAN (DENGAN VALIDASI)
      document
        .getElementById("p3kForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          // VALIDASI: Cegah simpan jika belum scan barcode!
          const boxValue = document.getElementById("box").value;
          if (!boxValue) {
            alert(
              "Peringatan: Anda belum melakukan Scan QR! Silakan Scan QR Code di Kotak P3K terlebih dahulu.",
            );
            return; // Hentikan proses simpan
          }

          const submitBtn = this.querySelector('button[type="submit"]');
          submitBtn.innerHTML = `⏳ <span>Menyimpan...</span>`;
          submitBtn.disabled = true;

          const data = {
            company: document.getElementById("company").value,
            officer: document.getElementById("officer").value,
            location: document.getElementById("location").value,
            box: document.getElementById("box").value,
            note: document.getElementById("note").value,
            items: items.map((item, index) => ({
              item: item.name,
              standard: item.standard,
              actual: document.getElementById(`actual-${index}`).value,
              expired: document.getElementById(`expired-${index}`).value,
              status: document.getElementById(`status-${index}`).innerText,
            })),
          };

          const file = document.getElementById("photo").files[0];
          if (file) {
            data.photoType = file.type;
            data.photo = await toBase64(file);
          }

          try {
            const response = await fetch(
              "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec",
              {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify(data),
              },
            );
            const result = await response.text();
            alert("Data berhasil disimpan!");

            // Bersihkan form
            document.getElementById("p3kForm").reset();
            preview.classList.add("hidden");

            // MENGEMBALIKAN NAMA PETUGAS AGAR TIDAK HILANG
            document.getElementById("officer").value =
              localStorage.getItem("santara_petugas");
          } catch (err) {
            alert("Gagal menyimpan data: " + err.message);
          } finally {
            submitBtn.innerHTML = `✅ <span>Simpan Pemeriksaan</span>`;
            submitBtn.disabled = false;
          }
        });

      // 8. GENERATE PDF
      async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(22);
        doc.text("Laporan Inspeksi Kotak P3K", 20, 20);
        doc.setFontSize(12);
        doc.text(
          `Perusahaan : ${document.getElementById("company").value}`,
          20,
          40,
        );
        doc.text(
          `Petugas : ${document.getElementById("officer").value}`,
          20,
          50,
        );
        doc.text(
          `Lokasi : ${document.getElementById("location").value}`,
          20,
          60,
        );

        let y = 80;
        items.forEach((item, index) => {
          const actual = document.getElementById(`actual-${index}`).value;
          const status = document.getElementById(`status-${index}`).innerText;
          doc.text(
            `${item.name} | Std: ${item.standard} | Aktual: ${actual} | ${status}`,
            20,
            y,
          );
          y += 10;
        });
        doc.save("laporan-p3k.pdf");
      }
    </script>
  </body>
</html>
