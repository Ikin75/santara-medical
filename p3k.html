<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>P3K Inspection - Santara Medical</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- HEADER -->

    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
        <h1 class="text-3xl font-extrabold">
          <span class="text-orange-500">Santara</span> P3K
        </h1>

        <a
          href="index.html"
          class="bg-orange-500 hover:bg-orange-600 transition px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <!-- CONTENT -->

    <section class="py-12 px-6">
      <div class="max-w-5xl mx-auto">
        <!-- TITLE -->

        <div class="mb-10">
          <h2 class="text-5xl font-black mb-4">Form Pemeriksaan P3K</h2>

          <p class="text-gray-500 text-lg">
            Pemeriksaan kelengkapan kotak P3K perusahaan.
          </p>
        </div>

        <!-- FORM -->

        <div class="bg-white rounded-3xl shadow-2xl p-10">
          <form id="p3kForm" class="space-y-10">
            <!-- INFO -->

            <div class="grid md:grid-cols-2 gap-6">
              <div>
                <label class="font-semibold mb-3 block">
                  Nama Perusahaan
                </label>

                <input
                  type="text"
                  id="company"
                  class="w-full border border-gray-200 rounded-2xl p-4"
                  placeholder="PT Santara Medical"
                />
              </div>

              <div>
                <label class="font-semibold mb-3 block"> Nama Petugas </label>

                <input
                  type="text"
                  id="officer"
                  class="w-full border border-gray-200 rounded-2xl p-4"
                  placeholder="Nama petugas"
                />
              </div>

              <div>
                <label class="font-semibold mb-3 block"> Lokasi </label>

                <input
                  type="text"
                  id="location"
                  class="w-full border border-gray-200 rounded-2xl p-4"
                  placeholder="Gudang A"
                />
              </div>

              <div>
                <label class="font-semibold mb-3 block"> Nomor Kotak </label>

                <input
                  type="text"
                  id="box"
                  class="w-full border border-gray-200 rounded-2xl p-4"
                  placeholder="P3K-001"
                />
              </div>
            </div>

            <!-- TABLE -->

            <div>
              <h3 class="text-3xl font-bold mb-8">Checklist Isi P3K</h3>

              <div class="overflow-auto">
                <div id="summaryBox" class="grid md:grid-cols-3 gap-6 mb-10">
                  <div class="bg-green-50 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-gray-500">Aman</h3>

                    <p
                      id="safeCount"
                      class="text-4xl font-black text-green-600 mt-2"
                    >
                      0
                    </p>
                  </div>

                  <div class="bg-yellow-50 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-gray-500">Kurang</h3>

                    <p
                      id="lessCount"
                      class="text-4xl font-black text-yellow-600 mt-2"
                    >
                      0
                    </p>
                  </div>

                  <div class="bg-red-50 rounded-2xl p-6">
                    <h3 class="text-lg font-semibold text-gray-500">Expired</h3>

                    <p
                      id="expiredCount"
                      class="text-4xl font-black text-red-600 mt-2"
                    >
                      0
                    </p>
                  </div>
                </div>
                <div class="bg-white rounded-2xl p-6 shadow mb-10">
                  <div class="flex justify-between mb-3">
                    <h3 class="font-bold text-lg">Kelengkapan Kotak P3K</h3>

                    <span id="percentageText" class="font-bold text-orange-500">
                      0%
                    </span>
                  </div>

                  <div
                    class="w-full bg-gray-200 h-5 rounded-full overflow-hidden"
                  >
                    <div
                      id="progressBar"
                      class="bg-orange-500 h-5 rounded-full transition-all duration-500"
                      style="width: 0%"
                    ></div>
                  </div>
                </div>
                <table class="w-full border-collapse">
                  <div
                    id="warningBox"
                    class="hidden mb-8 rounded-2xl border border-red-200 bg-red-50 p-6"
                  >
                    <h3 class="text-2xl font-black text-red-600 mb-4">
                      ⚠ Warning Inspection
                    </h3>

                    <div id="warningContent" class="space-y-3 text-lg"></div>
                  </div>
                  <thead>
                    <tr class="bg-orange-500 text-white">
                      <th class="p-4 text-left">Item</th>

                      <th class="p-4 text-left">Standar</th>

                      <th class="p-4 text-left">Aktual</th>

                      <th class="p-4 text-left">Bulan Lalu</th>

                      <th class="p-4 text-left">Selisih</th>

                      <th class="p-4 text-left">Expired</th>

                      <th class="p-4 text-left">Status</th>
                    </tr>
                  </thead>

                  <tbody id="tableBody"></tbody>
                </table>
              </div>
            </div>

            <!-- NOTE -->

            <div>
              <label class="font-semibold mb-3 block">
                Catatan Pemeriksaan
              </label>

              <textarea
                id="note"
                rows="5"
                class="w-full border border-gray-200 rounded-2xl p-4"
                placeholder="Tambahkan catatan..."
              ></textarea>
            </div>

            <!-- Upload Image -->
            <div class="mb-8">
              <label class="block font-bold mb-3">
                Foto Kondisi Kotak P3K
              </label>

              <input
                type="file"
                id="photo"
                accept="image/*"
                class="w-full border border-gray-200 rounded-2xl p-4 bg-white"
              />
            </div>
            <img
              id="preview"
              class="hidden mt-5 rounded-2xl shadow-xl max-h-80"
            />
            <!-- BUTTON -->
            <button
              type="button"
              onclick="generatePDF()"
              class="bg-black text-white px-8 py-4 rounded-2xl font-bold hover:bg-gray-800 transition"
            >
              📄 Generate PDF
            </button>
            <a
              href="history-p3k.html"
              class="bg-gray-200 text-gray-600 px-6 py-4 rounded-2xl font-bold hover:bg-gray-800 transition"
            >
              📋 History Pemeriksaan
            </a>
            <a
              href="dashboard-p3k.html"
              class="bg-orange-500 text-white px-6 py-4 rounded-2xl font-bold"
            >
              📊 Dashboard
            </a>
            <button
              type="submit"
              class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-5 rounded-2xl text-xl font-bold shadow-xl"
            >
              Simpan Pemeriksaan
            </button>
          </form>
        </div>
      </div>
    </section>

    <script>
      const items = [
        { name: "Kasa Steril", standard: 20 },
        { name: "Perban 5cm", standard: 2 },
        { name: "Perban 10cm", standard: 2 },
        { name: "Plester Cepat", standard: 10 },
        { name: "Kapas", standard: 1 },
        { name: "Gunting", standard: 1 },
        { name: "Masker", standard: 1 },
        { name: "Sarung Tangan", standard: 2 },
        { name: "Alkohol 70%", standard: 1 },
        { name: "Povidone Iodine", standard: 1 },
      ];

      const tableBody = document.getElementById("tableBody");

      items.forEach((item, index) => {
        setTimeout(() => {
          const actualInput = document.getElementById(`actual-${index}`);

          const expiredInput = document.getElementById(`expired-${index}`);

          const status = document.getElementById(`status-${index}`);

          function checkStatus() {
            let actual = parseInt(actualInput.value);

            // BATASI TIDAK BOLEH LEBIH

            if (actual > item.standard) {
              actualInput.value = item.standard;

              actual = item.standard;
            }

            const expiredDate = new Date(expiredInput.value);

            const today = new Date();

            status.className = "px-4 py-2 rounded-xl font-semibold";

            // EXPIRED

            if (expiredInput.value && expiredDate < today) {
              status.innerText = "Expired";

              status.classList.add("bg-red-100", "text-red-600");
            }

            // KURANG
            else if (actual < item.standard) {
              status.innerText = "Kurang";

              status.classList.add("bg-yellow-100", "text-yellow-600");
            }

            // AMAN
            else {
              status.innerText = "Aman";

              status.classList.add("bg-green-100", "text-green-600");
            }
            updateSummary();

            updateWarning();

            updateCompare(index, actual);
          }

          function updateCompare(index, actual) {
            // SIMULASI DATA BULAN LALU

            const lastMonth = item.standard;

            // TAMPILKAN

            document.getElementById(`last-${index}`).innerText = lastMonth;

            // SELISIH

            const diff = actual - lastMonth;

            const diffEl = document.getElementById(`diff-${index}`);

            diffEl.innerText = diff;

            diffEl.className = "font-bold";

            // WARNA

            if (diff < 0) {
              diffEl.classList.add("text-red-500");
            } else if (diff > 0) {
              diffEl.classList.add("text-green-500");
            } else {
              diffEl.classList.add("text-gray-500");
            }
          }

          function updateSummary() {
            let safe = 0;
            let less = 0;
            let expired = 0;

            items.forEach((item, index) => {
              const statusText = document.getElementById(
                `status-${index}`,
              ).innerText;

              if (statusText === "Aman") {
                safe++;
              } else if (statusText === "Kurang") {
                less++;
              } else if (statusText === "Expired") {
                expired++;
              }
            });

            document.getElementById("safeCount").innerText = safe;

            document.getElementById("lessCount").innerText = less;

            document.getElementById("expiredCount").innerText = expired;

            // PERCENTAGE

            const total = items.length;

            const percent = Math.round((safe / total) * 100);

            document.getElementById("percentageText").innerText = percent + "%";

            document.getElementById("progressBar").style.width = percent + "%";
          }

          function updateWarning() {
            let less = 0;
            let expired = 0;

            items.forEach((item, index) => {
              const statusText = document.getElementById(
                `status-${index}`,
              ).innerText;

              if (statusText === "Kurang") {
                less++;
              }

              if (statusText === "Expired") {
                expired++;
              }
            });

            const warningBox = document.getElementById("warningBox");

            const warningContent = document.getElementById("warningContent");

            warningContent.innerHTML = "";

            // JIKA ADA WARNING

            if (less > 0 || expired > 0) {
              warningBox.classList.remove("hidden");

              if (less > 0) {
                warningContent.innerHTML += `
      <div class="bg-yellow-100 text-yellow-700 px-5 py-4 rounded-xl font-semibold">
        ⚠ ${less} item kurang dari standar
      </div>
      `;
              }

              if (expired > 0) {
                warningContent.innerHTML += `
      <div class="bg-red-100 text-red-700 px-5 py-4 rounded-xl font-semibold">
        🚨 ${expired} item expired
      </div>
      `;
              }
            }

            // AMAN
            else {
              warningBox.classList.add("hidden");
            }
          }

          actualInput.addEventListener("input", checkStatus);

          expiredInput.addEventListener("change", checkStatus);
        }, 100);

        tableBody.innerHTML += `

    <tr class="border-b">

      <td class="p-4 font-medium">
        ${item.name}
      </td>

      <td class="p-4 text-center">
        ${item.standard}
      </td>

      <td class="p-4">

        <input
        type="number"
        max="${item.standard}"
        id="actual-${index}"
        class="w-full border border-gray-200 rounded-xl p-3"
        value="${item.standard}"/>

      </td>
<td class="p-4">

  <span
  id="last-${index}"
  class="font-semibold text-gray-500">

    0

  </span>

</td>

<td class="p-4">

  <span
  id="diff-${index}"
  class="font-bold">

    0

  </span>

</td>
      <td class="p-4">

        <input
        type="date"
        id="expired-${index}"
        class="w-full border border-gray-200 rounded-xl p-3"/>

      </td>

      <td class="p-4">

  <span
  id="status-${index}"
  class="px-4 py-2 rounded-xl bg-green-100 text-green-600 font-semibold">

    Aman

  </span>

</td>

    </tr>

  `;
      });

      document
        .getElementById("p3kForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const data = {
            company: document.getElementById("company").value,
            officer: document.getElementById("officer").value,
            location: document.getElementById("location").value,
            box: document.getElementById("box").value,
            note: document.getElementById("note").value,

            items: items.map((item, index) => ({
              item: item.name,
              standard: item.standard,

              actual: document.getElementById(`actual-${index}`).value,

              expired: document.getElementById(`expired-${index}`).value,

              status: document.getElementById(`status-${index}`).innerText,
            })),
          };

          // FOTO

          const file = document.getElementById("photo").files[0];

          let photoBase64 = "";
          let photoType = "";

          if (file) {
            photoType = file.type;

            photoBase64 = await toBase64(file);
          }

          data.photo = photoBase64;

          data.photoType = photoType;

          // KIRIM

          const response = await fetch(
            "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec",
            {
              method: "POST",
              headers: {
                "Content-Type": "text/plain;charset=utf-8",
              },
              body: JSON.stringify(data),
            },
          );

          const result = await response.text();

          console.log(result);

          alert(result);

          document.getElementById("p3kForm").reset();
        });

      async function generatePDF() {
        const { jsPDF } = window.jspdf;

        const doc = new jsPDF();

        // TITLE

        doc.setFontSize(22);

        doc.text("Laporan Inspeksi Kotak P3K", 20, 20);

        // INFO

        doc.setFontSize(12);

        const company = document.getElementById("company").value;

        const officer = document.getElementById("officer").value;

        const location = document.getElementById("location").value;

        doc.text(`Perusahaan : ${company}`, 20, 40);

        doc.text(`Petugas : ${officer}`, 20, 50);

        doc.text(`Lokasi : ${location}`, 20, 60);

        // TABLE

        let y = 80;

        items.forEach((item, index) => {
          const actual = document.getElementById(`actual-${index}`).value;

          const status = document.getElementById(`status-${index}`).innerText;

          doc.text(
            `${item.name} | Std: ${item.standard} | Aktual: ${actual} | ${status}`,
            20,
            y,
          );

          y += 10;
        });

        // DOWNLOAD

        doc.save("laporan-p3k.pdf");
      }
      const photoInput = document.getElementById("photo");

      const preview = document.getElementById("preview");

      photoInput.addEventListener("change", (e) => {
        const file = e.target.files[0];

        if (file) {
          preview.src = URL.createObjectURL(file);

          preview.classList.remove("hidden");
        }
      });

      function toBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();

          reader.readAsDataURL(file);

          reader.onload = () => {
            resolve(reader.result.split(",")[1]);
          };

          reader.onerror = (error) => reject(error);
        });
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);

      const box = params.get("box");

      const locationName = params.get("location");

      if (box) {
        document.getElementById("box").value = box;
      }

      if (locationName) {
        document.getElementById("location").value = locationName;
      }
    </script>
  </body>
</html>
