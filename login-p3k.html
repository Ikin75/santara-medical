<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Petugas P3K - Santara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center px-6">
    <div
      class="bg-white max-w-md w-full rounded-[32px] shadow-2xl p-10 relative overflow-hidden"
    >
      <div
        class="absolute -top-16 -right-16 w-40 h-40 bg-orange-500/20 blur-3xl rounded-full"
      ></div>

      <div class="text-center mb-10 relative z-10">
        <h1 class="text-3xl font-black mb-2">
          <span class="text-orange-500">Santara</span> P3K
        </h1>
        <p class="text-gray-500">Silakan login untuk memulai inspeksi.</p>
      </div>

      <form id="loginForm" class="space-y-6 relative z-10">
        <div>
          <label class="font-semibold text-gray-700 block mb-2"
            >Nama Petugas</label
          >
          <input
            type="text"
            id="loginName"
            required
            class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none"
            placeholder="Masukkan nama Anda..."
          />
        </div>

        <div>
          <label class="font-semibold text-gray-700 block mb-2"
            >PIN Akses</label
          >
          <input
            type="password"
            id="loginPin"
            required
            class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none"
            placeholder="******"
          />
        </div>

        <p id="errorMsg" class="text-red-500 text-sm font-semibold hidden">
          ❌ PIN Akses Salah!
        </p>

        <button
          type="submit"
          class="w-full bg-black text-white py-4 rounded-xl font-bold text-lg hover:bg-orange-500 transition-colors shadow-lg"
        >
          Masuk ke Form Inspeksi
        </button>
      </form>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const name = document.getElementById("loginName").value;
          const pin = document.getElementById("loginPin").value;

          // SETTING PIN RAHASIA DI SINI
          const PIN_BENAR = "123456";

          if (pin === PIN_BENAR) {
            // Simpan nama petugas ke memori browser
            localStorage.setItem("santara_petugas", name);
            // Arahkan ke halaman form P3K
            window.location.href = "p3k.html";
          } else {
            // Munculkan error
            document.getElementById("errorMsg").classList.remove("hidden");
          }
        });
    </script>
  </body>
</html>
