<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baca Artikel - Santara Medical</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
      }
      /* Styling Khusus Paragraf Artikel */
      .article-content p {
        margin-bottom: 1.5em;
        line-height: 1.8;
        font-size: 1.125rem;
      }
      .article-content h2 {
        font-size: 1.75rem;
        font-weight: 800;
        margin-top: 2em;
        margin-bottom: 1em;
        color: #f97316;
      }
      .article-content ul {
        list-style-type: disc;
        margin-left: 1.5rem;
        margin-bottom: 1.5em;
      }
      .article-content li {
        margin-bottom: 0.5em;
        line-height: 1.8;
      }
    </style>
  </head>

  <body
    class="bg-white dark:bg-[#0f0f0f] text-gray-800 dark:text-gray-200 transition-colors duration-300 relative min-h-screen"
  >
    <header
      class="pt-6 px-6 relative z-20 border-b border-gray-100 dark:border-white/10 pb-4 bg-white dark:bg-[#0f0f0f] sticky top-0"
    >
      <div class="max-w-7xl mx-auto flex justify-between items-center">
        <a
          href="index.html"
          class="text-2xl font-extrabold tracking-tight flex items-center gap-2"
        >
          <span class="text-orange-500">Santara</span>
          <span class="text-gray-900 dark:text-white">Medical</span>
        </a>

        <button
          id="darkToggle"
          class="w-10 h-10 rounded-xl bg-gray-50 dark:bg-[#151515] border border-gray-200 dark:border-white/10 flex items-center justify-center hover:text-orange-500 transition-colors shadow-sm"
        >
          🌙
        </button>
      </div>
    </header>

    <main class="py-10 px-6 max-w-7xl mx-auto">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 relative">
        <aside class="hidden lg:block lg:col-span-1">
          <div class="sticky top-32 flex flex-col gap-4 items-center">
            <a
              href="#"
              class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center hover:scale-110 transition-transform shadow-md"
            >
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12z"
                />
              </svg>
            </a>
            <a
              href="#"
              class="w-10 h-10 rounded-full bg-sky-400 text-white flex items-center justify-center hover:scale-110 transition-transform shadow-md"
            >
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"
                />
              </svg>
            </a>
            <a
              href="#"
              class="w-10 h-10 rounded-full bg-green-500 text-white flex items-center justify-center hover:scale-110 transition-transform shadow-md"
            >
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path
                  d="M12.012 2C6.48 2 2 6.48 2 12.012c0 1.756.456 3.434 1.258 4.923L2.1 22l5.253-1.118A9.953 9.953 0 0012.012 22c5.533 0 10.012-4.48 10.012-10.012C22.024 6.48 17.545 2 12.012 2zM17.3 16.48c-.246.685-1.187 1.285-1.928 1.417-.557.102-1.284.237-3.666-.75-2.884-1.196-4.757-4.14-4.898-4.329-.14-.188-1.168-1.572-1.168-3.003 0-1.431.75-2.14 1.018-2.433.268-.292.583-.365.776-.365.193 0 .386.002.556.009.2.008.468-.078.732.559.268.643.916 2.23.995 2.378.08.148.13.322.036.52-.093.197-.14.318-.28.487-.14.168-.294.364-.42.502-.14.152-.288.318-.12.571.168.252.75 1.2 1.636 1.988 1.144 1.018 2.083 1.332 2.333 1.453.25.122.397.1.545-.07.148-.17 .639-.747.81-1.002.17-.255.34-.213.567-.13.227.083 1.438.677 1.685.798.246.122.41.182.47.283.06.1.06.58-.186 1.265z"
                />
              </svg>
            </a>
          </div>
        </aside>

        <article class="lg:col-span-7 xl:col-span-8" id="mainArticleContent">
          <div class="text-center py-20 text-gray-500" id="loadingState">
            <div
              class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"
            ></div>
            Memuat artikel...
          </div>
        </article>

        <aside class="lg:col-span-4 xl:col-span-3 space-y-10">
          <div>
            <div class="relative group">
              <input
                type="text"
                placeholder="Cari artikel..."
                class="w-full py-3.5 pl-5 pr-12 rounded-xl border border-gray-200 dark:border-white/10 dark:bg-[#151515] dark:text-white shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500/50 text-sm transition-all"
                onclick="window.location.href = 'articles.html'"
              />
              <span
                class="absolute right-4 top-1/2 -translate-y-1/2 text-xl cursor-pointer"
                >🔍</span
              >
            </div>
          </div>

          <div>
            <h3
              class="text-lg font-bold mb-4 dark:text-white flex items-center justify-between"
            >
              Topik Terkini
              <a
                href="articles.html"
                class="text-orange-500 text-sm font-semibold hover:underline"
                >Lihat Semua</a
              >
            </h3>
            <div class="flex flex-wrap gap-2">
              <a
                href="articles.html"
                class="px-3 py-1.5 border border-gray-200 dark:border-white/10 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-orange-500 hover:text-orange-500 transition"
                >Ergonomi</a
              >
              <a
                href="articles.html"
                class="px-3 py-1.5 border border-gray-200 dark:border-white/10 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-orange-500 hover:text-orange-500 transition"
                >Lifestyle</a
              >
              <a
                href="articles.html"
                class="px-3 py-1.5 border border-gray-200 dark:border-white/10 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-orange-500 hover:text-orange-500 transition"
                >Mata Lelah</a
              >
              <a
                href="articles.html"
                class="px-3 py-1.5 border border-gray-200 dark:border-white/10 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-orange-500 hover:text-orange-500 transition"
                >Burnout</a
              >
              <a
                href="articles.html"
                class="px-3 py-1.5 border border-gray-200 dark:border-white/10 rounded-lg text-sm text-gray-600 dark:text-gray-300 hover:border-orange-500 hover:text-orange-500 transition"
                >Nutrisi</a
              >
            </div>
          </div>

          <div>
            <h3
              class="text-lg font-bold mb-5 dark:text-white border-b border-gray-100 dark:border-white/5 pb-2"
            >
              Artikel Terkait
            </h3>
            <div class="flex flex-col gap-5" id="relatedArticlesWidget"></div>
          </div>
        </aside>
      </div>
    </main>

    <footer
      class="border-t border-gray-200 dark:border-white/10 mt-10 py-8 text-center text-gray-500 dark:text-gray-400 text-sm"
    >
      <p>© 2026 Santara Medical. All Rights Reserved.</p>
    </footer>

    <script>
      // 1. Dark Mode
      const darkToggle = document.getElementById("darkToggle");
      if (localStorage.getItem("dark-mode") === "true") {
        document.documentElement.classList.add("dark");
      }
      darkToggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
        localStorage.setItem(
          "dark-mode",
          document.documentElement.classList.contains("dark"),
        );
      });

      // 2. Fungsi Mengambil & Menampilkan Artikel
      async function loadArticlePage() {
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = parseInt(urlParams.get("id"));
        const mainContainer = document.getElementById("mainArticleContent");
        const relatedContainer = document.getElementById(
          "relatedArticlesWidget",
        );

        if (!articleId) {
          mainContainer.innerHTML = `<h2 class="text-2xl font-bold">Artikel tidak ditemukan.</h2>`;
          return;
        }

        try {
          // Fetch data
          const response = await fetch("./articles.json");
          const articles = await response.json();

          // Cari artikel utama
          const currentArticle = articles.find((a) => a.id === articleId);

          if (!currentArticle) {
            mainContainer.innerHTML = `<h2 class="text-2xl font-bold">Artikel tidak tersedia.</h2>`;
            return;
          }

          document.title = currentArticle.title + " - Santara Medical";

          // --- RENDER ARTIKEL UTAMA (Tengah) ---
          mainContainer.innerHTML = `
            <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-8">
              <a href="index.html" class="hover:text-orange-500">Home</a>
              <span>›</span>
              <a href="articles.html" class="hover:text-orange-500">Kesehatan</a>
              <span>›</span>
              <span class="text-gray-800 dark:text-gray-200 font-medium">${currentArticle.category}</span>
            </nav>

            <h1 class="text-3xl md:text-4xl lg:text-5xl font-black mb-6 leading-tight text-gray-900 dark:text-white tracking-tight">
              ${currentArticle.title}
            </h1>

            <div class="text-sm text-gray-500 dark:text-gray-400 mb-8">
              Ditinjau oleh <span class="text-orange-500 font-semibold cursor-pointer hover:underline">Tim Medis Santara</span> • 5 menit baca
            </div>

            <img 
              src="${currentArticle.image}" 
              alt="${currentArticle.title}" 
              class="w-full h-[300px] md:h-[450px] object-cover rounded-[24px] shadow-lg mb-10" 
            />

            <div class="article-content text-gray-700 dark:text-gray-300">
              ${currentArticle.content ? currentArticle.content : "<p>Konten artikel sedang dalam perbaikan.</p>"}
            </div>
          `;

          // --- RENDER ARTIKEL TERKAIT (Kanan) ---
          // Ambil artikel lain (kecuali yang sedang dibaca), maksimal 4 buah
          const relatedArticles = articles
            .filter((a) => a.id !== articleId)
            .slice(0, 4);

          relatedContainer.innerHTML = "";
          relatedArticles.forEach((item) => {
            relatedContainer.innerHTML += `
              <a href="article.html?id=${item.id}" class="group flex items-start gap-4">
                <img src="${item.image}" class="w-24 h-20 object-cover rounded-xl shadow-sm group-hover:shadow-md transition-shadow" alt="${item.title}">
                <div class="flex-1">
                  <h4 class="text-sm font-bold text-gray-800 dark:text-white leading-snug group-hover:text-orange-500 transition-colors line-clamp-2 mb-2">
                    ${item.title}
                  </h4>
                  <div class="flex items-center gap-2">
                    <span class="text-[10px] font-semibold bg-orange-50 dark:bg-orange-500/10 text-orange-500 px-2 py-1 rounded">
                      ${item.category}
                    </span>
                    <span class="text-[11px] text-gray-400">5 menit</span>
                  </div>
                </div>
              </a>
            `;
          });
        } catch (error) {
          mainContainer.innerHTML = `<h2 class="text-2xl font-bold">Gagal memuat artikel.</h2>`;
        }
      }

      loadArticlePage();
    </script>
  </body>
</html>
