<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard P3K - Santara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-50">
    <script>
      if (localStorage.getItem("isLogin") !== "true") {
        window.location.href = "login.html";
      }
      function logoutAdmin() {
        localStorage.removeItem("isLogin");
        window.location.href = "login.html";
      }
    </script>

    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500">Santara</span> Dashboard
        </h1>
        <div class="flex gap-3">
          <a
            href="rekap-p3k.html"
            class="bg-orange-500 hover:bg-orange-600 text-white transition px-4 py-3 rounded-xl font-semibold text-sm"
            >📋 Log Pemakaian</a
          >
          <a
            href="index.html"
            class="bg-gray-800 hover:bg-gray-700 transition px-4 py-3 rounded-xl font-semibold text-sm hidden sm:block"
            >Home Website</a
          >
          <button
            onclick="logoutAdmin()"
            class="bg-red-500 hover:bg-red-600 px-4 py-3 rounded-xl font-semibold text-sm transition"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <section class="py-12 px-6">
      <div class="max-w-7xl mx-auto">
        <div
          class="flex flex-col md:flex-row justify-between items-end gap-6 mb-10 border-b border-gray-200 pb-6"
        >
          <div>
            <h2 class="text-4xl md:text-5xl font-black mb-2">
              📊 Dashboard Analytics
            </h2>
            <p class="text-gray-500 text-lg">
              Monitoring inspeksi kotak P3K secara realtime.
            </p>
          </div>
          <div class="w-full md:w-auto">
            <label class="text-sm font-bold text-gray-500 block mb-2"
              >Filter Perusahaan:</label
            >
            <select
              id="companyFilter"
              class="w-full md:w-72 p-4 rounded-xl border border-gray-300 shadow-sm focus:ring-2 focus:ring-orange-500 outline-none font-bold text-gray-800 cursor-pointer appearance-none bg-white"
            >
              <option value="ALL">🏢 Semua Perusahaan</option>
            </select>
          </div>
        </div>

        <p
          class="text-center text-orange-500 font-bold animate-pulse mb-6"
          id="loadingText"
        >
          Mengambil data dari server...
        </p>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-10">
          <div
            class="bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-gray-100"
          >
            <h3 class="text-gray-500 font-semibold text-sm md:text-base">
              Total Item Diperiksa
            </h3>
            <p
              id="totalInspection"
              class="text-4xl md:text-5xl font-black mt-3 text-gray-800"
            >
              0
            </p>
          </div>
          <div
            class="bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-gray-100"
          >
            <h3 class="text-gray-500 font-semibold text-sm md:text-base">
              Kotak Terekam
            </h3>
            <p
              id="totalBox"
              class="text-4xl md:text-5xl font-black mt-3 text-gray-800"
            >
              0
            </p>
          </div>
          <div
            class="bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-gray-100"
          >
            <h3 class="text-gray-500 font-semibold text-sm md:text-base">
              Item Kurang
            </h3>
            <p
              id="totalLess"
              class="text-4xl md:text-5xl font-black text-yellow-500 mt-3"
            >
              0
            </p>
          </div>
          <div
            class="bg-white rounded-3xl p-6 md:p-8 shadow-xl border border-gray-100"
          >
            <h3 class="text-gray-500 font-semibold text-sm md:text-base">
              Item Expired
            </h3>
            <p
              id="totalExpired"
              class="text-4xl md:text-5xl font-black text-red-500 mt-3"
            >
              0
            </p>
          </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
          <div
            class="bg-white rounded-3xl p-8 shadow-2xl border border-gray-100"
          >
            <h3 class="text-2xl font-black mb-6 text-center md:text-left">
              Status Item Keseluruhan
            </h3>
            <div class="w-full max-w-sm mx-auto relative">
              <canvas id="statusChart"></canvas>
            </div>
          </div>
          <div
            class="bg-white rounded-3xl p-8 shadow-2xl border border-gray-100"
          >
            <h3 class="text-2xl font-black mb-6 flex items-center gap-2">
              🚨 Kotak Paling Bermasalah
            </h3>
            <div
              id="problemBox"
              class="space-y-4 max-h-[300px] overflow-y-auto pr-2"
            ></div>
          </div>
        </div>
      </div>
    </section>

    <script>
      // Wajib disamakan dengan URL Google Script App milikmu
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec";

      let globalData = []; // Simpan semua data dari server
      let myChart = null; // Variabel untuk menyimpan status grafik agar bisa di-reset

      fetch(SCRIPT_URL)
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("loadingText").style.display = "none";
          // Saring data kosong
          globalData = data.filter((row) => row.box && row.status);

          setupFilter(globalData);
          renderDashboard("ALL");
        })
        .catch((err) => {
          document.getElementById("loadingText").innerText =
            "Gagal memuat data. Pastikan Google Script sudah di-deploy ulang.";
          console.error(err);
        });

      // MENGISI MENU DROPDOWN FILTER
      function setupFilter(data) {
        const select = document.getElementById("companyFilter");
        // Ambil nama perusahaan secara unik (tidak ada duplikat)
        const uniqueCompanies = [
          ...new Set(data.map((item) => item.company).filter(Boolean)),
        ];

        uniqueCompanies.forEach((company) => {
          select.innerHTML += `<option value="${company}">${company}</option>`;
        });

        // Pasang sensor: Jika filter diubah, render ulang dashboardnya
        select.addEventListener("change", (e) => {
          renderDashboard(e.target.value);
        });
      }

      // RENDER ULANG DASHBOARD BERDASARKAN FILTER
      function renderDashboard(companyName) {
        let filteredData = globalData;

        // Saring data jika yang dipilih bukan "ALL"
        if (companyName !== "ALL") {
          filteredData = globalData.filter(
            (item) => item.company === companyName,
          );
        }

        // UPDATE KOTAK ANGKA (SUMMARY)
        document.getElementById("totalInspection").innerText =
          filteredData.length;
        const uniqueBox = [...new Set(filteredData.map((row) => row.box))];
        document.getElementById("totalBox").innerText = uniqueBox.length;

        let aman = 0,
          kurang = 0,
          expired = 0;
        let boxProblem = {};

        filteredData.forEach((row) => {
          if (row.status === "Aman") aman++;
          if (row.status === "Kurang") {
            kurang++;
            boxProblem[row.box] = (boxProblem[row.box] || 0) + 1;
          }
          if (row.status === "Expired") {
            expired++;
            boxProblem[row.box] = (boxProblem[row.box] || 0) + 1;
          }
        });

        document.getElementById("totalLess").innerText = kurang;
        document.getElementById("totalExpired").innerText = expired;

        // RENDER GRAFIK
        if (myChart) {
          myChart.destroy(); // Hancurkan grafik lama sebelum membuat yang baru agar tidak tumpang tindih
        }

        const ctx = document.getElementById("statusChart").getContext("2d");
        myChart = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels: ["Aman", "Kurang", "Expired"],
            datasets: [
              {
                data: [aman, kurang, expired],
                backgroundColor: ["#22c55e", "#eab308", "#ef4444"], // Hijau, Kuning, Merah
                borderWidth: 0,
                hoverOffset: 4,
              },
            ],
          },
          options: { plugins: { legend: { position: "bottom" } } },
        });

        // RENDER KOTAK BERMASALAH
        const sortedBox = Object.entries(boxProblem)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5);
        const problemContainer = document.getElementById("problemBox");

        problemContainer.innerHTML = ""; // Bersihkan list sebelumnya

        if (sortedBox.length === 0) {
          problemContainer.innerHTML = `<div class="bg-green-50 text-green-600 p-5 rounded-2xl text-center font-bold">✅ Tidak ada masalah di perusahaan ini!</div>`;
        } else {
          sortedBox.forEach((box) => {
            problemContainer.innerHTML += `
              <div class="bg-red-50 border border-red-200 rounded-2xl p-5 flex justify-between items-center transition hover:shadow-md">
                <h3 class="font-black text-xl text-red-600">${box[0]}</h3>
                <span class="bg-red-200 text-red-800 font-bold px-3 py-1 rounded-lg text-sm">${box[1]} Masalah</span>
              </div>
            `;
          });
        }
      }
    </script>
  </body>
</html>
