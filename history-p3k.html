<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>History P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500">Santara</span>
          History P3K
        </h1>

        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <section class="py-12 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="mb-10">
          <h2 class="text-5xl font-black mb-4">Riwayat Pemeriksaan</h2>

          <p class="text-gray-500 text-lg">Data realtime dari spreadsheet.</p>
        </div>

        <!-- SEARCH -->

        <div class="mb-8">
          <input
            type="text"
            id="searchInput"
            placeholder="Cari perusahaan / lokasi..."
            class="w-full border border-gray-200 rounded-2xl p-5 shadow-lg"
          />
        </div>

        <!-- TABLE -->

        <div class="bg-white rounded-3xl shadow-2xl overflow-auto">
          <table class="w-full">
            <thead class="bg-orange-500 text-white">
              <tr>
                <th class="p-4 text-left">Tanggal</th>
                <th class="p-4 text-left">Perusahaan</th>
                <th class="p-4 text-left">Lokasi</th>
                <th class="p-4 text-left">Box</th>
                <th class="p-4 text-left">Item</th>
                <th class="p-4 text-left">Status</th>
                <th class="p-4 text-left">Foto</th>
              </tr>
            </thead>

            <tbody id="historyBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <script>
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec";

      async function loadData() {
        const response = await fetch(scriptURL);

        const data = await response.json();

        const historyBody = document.getElementById("historyBody");

        historyBody.innerHTML = "";

        data.reverse().forEach((item) => {
          let statusColor = "bg-green-100 text-green-600";

          if (item.status === "Kurang") {
            statusColor = "bg-yellow-100 text-yellow-600";
          }

          if (item.status === "Expired") {
            statusColor = "bg-red-100 text-red-600";
          }

          historyBody.innerHTML += `

<tr class="border-b hover:bg-gray-50 transition">

<td class="p-4">
${new Date(item.date).toLocaleDateString()}
</td>

<td class="p-4 font-semibold">
${item.company}
</td>

<td class="p-4">
${item.location}
</td>

<td class="p-4">
${item.box}
</td>

<td class="p-4">
${item.item}
</td>

<td class="p-4">

<span class="px-4 py-2 rounded-xl font-semibold ${statusColor}">

${item.status}

</span>

</td>

<td class="p-4">

${
  item.photo
    ? `
<a
href="${item.photo}"
target="_blank"
class="bg-black text-white px-4 py-2 rounded-xl">
Lihat
</a>
`
    : "-"
}

</td>

</tr>

`;
        });
      }

      loadData();

      document
        .getElementById("searchInput")
        .addEventListener("keyup", function () {
          const filter = this.value.toLowerCase();

          const rows = document.querySelectorAll("#historyBody tr");

          rows.forEach((row) => {
            const text = row.innerText.toLowerCase();

            row.style.display = text.includes(filter) ? "" : "none";
          });
        });
    </script>
  </body>
</html>
