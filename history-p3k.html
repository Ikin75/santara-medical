<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History P3K - Santara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
      /* Warna selang-seling untuk tabel agar mudah dibaca */
      tr:nth-child(even) {
        background-color: #f9fafb;
      }
    </style>
  </head>

  <body class="bg-gray-50">
    <script>
      if (localStorage.getItem("isLogin") !== "true") {
        window.location.href = "login.html";
      }
      function logoutAdmin() {
        localStorage.removeItem("isLogin");
        window.location.href = "login.html";
      }
    </script>

    <header class="bg-black text-white py-5 shadow-xl sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500">Santara</span> History
        </h1>
        <div class="flex gap-3">
          <a
            href="dashboard-p3k.html"
            class="bg-gray-800 hover:bg-gray-700 transition px-5 py-3 rounded-xl font-semibold hidden sm:block"
            >Dashboard</a
          >
          <button
            onclick="logoutAdmin()"
            class="bg-red-500 hover:bg-red-600 transition px-5 py-3 rounded-xl font-semibold"
          >
            Logout
          </button>
        </div>
      </div>
    </header>

    <section class="py-12 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="mb-10 text-center md:text-left">
          <h2 class="text-4xl md:text-5xl font-black mb-4">
            📋 Rekam Jejak Inspeksi
          </h2>
          <p class="text-gray-500 text-lg">
            Pantau seluruh riwayat pengecekan kotak P3K.
          </p>
        </div>

        <div
          class="bg-white rounded-3xl shadow-xl p-6 mb-8 border border-gray-100 flex flex-col md:flex-row gap-4"
        >
          <div class="w-full md:w-1/3">
            <label class="text-sm font-bold text-gray-500 block mb-2"
              >Pilih Perusahaan:</label
            >
            <select
              id="companyFilter"
              class="w-full border border-gray-200 rounded-2xl p-4 bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none font-semibold cursor-pointer"
            >
              <option value="ALL">🏢 Semua Perusahaan</option>
            </select>
          </div>

          <div class="w-full md:w-2/3 relative flex items-end">
            <div class="w-full relative">
              <span
                class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xl"
                >🔍</span
              >
              <input
                type="text"
                id="searchBox"
                placeholder="Cari nomor kotak, lokasi, atau nama petugas..."
                class="w-full border border-gray-200 rounded-2xl py-4 pl-12 pr-4 bg-gray-50 focus:ring-2 focus:ring-orange-500 outline-none font-semibold transition"
              />
            </div>
          </div>
        </div>

        <p
          class="text-center text-orange-500 font-bold animate-pulse mb-6"
          id="loadingText"
        >
          Menarik data dari database...
        </p>

        <div
          class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-200"
        >
          <div class="overflow-x-auto max-h-[600px]">
            <table
              class="w-full border-collapse min-w-[1000px] text-sm md:text-base"
            >
              <thead
                class="bg-orange-500 text-white sticky top-0 z-10 shadow-md"
              >
                <tr>
                  <th class="p-4 text-left whitespace-nowrap">Tanggal</th>
                  <th class="p-4 text-left">Perusahaan</th>
                  <th class="p-4 text-left whitespace-nowrap">Box</th>
                  <th class="p-4 text-left">Lokasi</th>
                  <th class="p-4 text-left">Petugas</th>
                  <th class="p-4 text-left">Item P3K</th>
                  <th class="p-4 text-center">Aktual</th>
                  <th class="p-4 text-center">Status</th>
                  <th class="p-4 text-center">Foto</th>
                </tr>
              </thead>
              <tbody id="historyTable" class="text-gray-700"></tbody>
            </table>
          </div>
          <div id="emptyState" class="hidden p-10 text-center text-gray-400">
            <p class="text-5xl mb-3">📭</p>
            <p class="font-semibold text-lg">
              Tidak ada riwayat yang ditemukan.
            </p>
          </div>
        </div>
      </div>
    </section>

    <script>
      // WAJIB SAMA DENGAN GOOGLE SCRIPT MILIKMU
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec";
      let allData = [];

      fetch(SCRIPT_URL)
        .then((res) => res.json())
        .then((data) => {
          document.getElementById("loadingText").style.display = "none";
          // Saring baris kosong dan balik urutan (terbaru di atas)
          allData = data.filter((row) => row.date && row.box).reverse();

          setupCompanyFilter();
          renderTable(allData);
        })
        .catch((err) => {
          document.getElementById("loadingText").innerText =
            "Gagal memuat data dari server.";
          console.error(err);
        });

      // MENGISI MENU FILTER PERUSAHAAN
      function setupCompanyFilter() {
        const select = document.getElementById("companyFilter");
        const uniqueCompanies = [
          ...new Set(allData.map((item) => item.company).filter(Boolean)),
        ];

        uniqueCompanies.forEach((company) => {
          select.innerHTML += `<option value="${company}">${company}</option>`;
        });
      }

      // FUNGSI RENDER TABEL
      function renderTable(dataToRender) {
        const table = document.getElementById("historyTable");
        const emptyState = document.getElementById("emptyState");
        table.innerHTML = "";

        if (dataToRender.length === 0) {
          emptyState.classList.remove("hidden");
          return;
        } else {
          emptyState.classList.add("hidden");
        }

        dataToRender.forEach((row) => {
          // Format Tanggal (Misal: 29 Mei 2026, 14:30)
          let dateStr = "-";
          if (row.date) {
            const d = new Date(row.date);
            // Pastikan valid date
            if (!isNaN(d)) {
              dateStr =
                d.toLocaleDateString("id-ID", {
                  day: "2-digit",
                  month: "short",
                  year: "numeric",
                }) +
                " " +
                d.toLocaleTimeString("id-ID", {
                  hour: "2-digit",
                  minute: "2-digit",
                });
            }
          }

          // Desain Badge Status
          let statusBadge = "";
          if (row.status === "Aman") {
            statusBadge = `<span class="bg-green-100 text-green-700 border border-green-200 font-bold px-3 py-1 rounded-full text-xs uppercase tracking-wide">Aman</span>`;
          } else if (row.status === "Kurang") {
            statusBadge = `<span class="bg-yellow-100 text-yellow-700 border border-yellow-200 font-bold px-3 py-1 rounded-full text-xs uppercase tracking-wide">Kurang</span>`;
          } else {
            statusBadge = `<span class="bg-red-100 text-red-700 border border-red-200 font-bold px-3 py-1 rounded-full text-xs uppercase tracking-wide">${row.status || "Expired"}</span>`;
          }

          // Desain Link Foto
          let photoLink = `<span class="text-gray-300">-</span>`;
          if (row.photo && row.photo.trim() !== "") {
            photoLink = `<a href="${row.photo}" target="_blank" class="bg-gray-100 hover:bg-gray-200 text-gray-800 font-semibold px-3 py-1 rounded-lg text-sm transition">📷 Lihat</a>`;
          }

          table.innerHTML += `
            <tr class="hover:bg-orange-50 transition duration-150 group">
              <td class="p-4 whitespace-nowrap text-sm">${dateStr}</td>
              <td class="p-4 font-semibold text-gray-800">${row.company || "-"}</td>
              <td class="p-4 font-black text-orange-600">${row.box || "-"}</td>
              <td class="p-4 text-sm">${row.location || "-"}</td>
              <td class="p-4 text-sm capitalize">${row.officer || "-"}</td>
              <td class="p-4 font-medium text-gray-800">${row.item || "-"}</td>
              <td class="p-4 text-center font-bold text-gray-500">${row.actual !== undefined ? row.actual : "-"}</td>
              <td class="p-4 text-center">${statusBadge}</td>
              <td class="p-4 text-center">${photoLink}</td>
            </tr>
          `;
        });
      }

      // FUNGSI GABUNGAN: SEARCH & FILTER
      function applyFilters() {
        const companyVal = document.getElementById("companyFilter").value;
        const keyword = document
          .getElementById("searchBox")
          .value.toLowerCase();

        const filtered = allData.filter((row) => {
          // Cek Perusahaan
          const matchCompany =
            companyVal === "ALL" || row.company === companyVal;

          // Cek Keyword (Bisa cari dari Box, Lokasi, Petugas, atau Item)
          const matchKeyword =
            (row.box && row.box.toLowerCase().includes(keyword)) ||
            (row.location && row.location.toLowerCase().includes(keyword)) ||
            (row.officer && row.officer.toLowerCase().includes(keyword)) ||
            (row.item && row.item.toLowerCase().includes(keyword));

          return matchCompany && matchKeyword;
        });

        renderTable(filtered);
      }

      // Pasang Trigger
      document
        .getElementById("companyFilter")
        .addEventListener("change", applyFilters);
      document
        .getElementById("searchBox")
        .addEventListener("input", applyFilters);
    </script>
  </body>
</html>
