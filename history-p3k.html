<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>History P3K</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <header class="bg-black text-white py-5 shadow-xl">
      <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
        <h1 class="text-3xl font-black">
          <span class="text-orange-500"> Santara </span>

          History P3K
        </h1>

        <a
          href="p3k.html"
          class="bg-orange-500 hover:bg-orange-600 px-5 py-3 rounded-xl font-semibold"
        >
          Kembali
        </a>
      </div>
    </header>

    <section class="py-12 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="mb-10">
          <h2 class="text-5xl font-black mb-4">📋 History Pemeriksaan</h2>

          <p class="text-gray-500 text-lg">Semua histori inspeksi kotak P3K.</p>
        </div>

        <!-- SEARCH -->

        <div class="bg-white rounded-3xl shadow-xl p-6 mb-8">
          <input
            type="text"
            id="searchBox"
            placeholder="Cari box / lokasi / petugas..."
            class="w-full border border-gray-200 rounded-2xl p-4"
          />
        </div>

        <!-- TABLE -->

        <div class="bg-white rounded-3xl shadow-2xl p-6 overflow-auto">
          <table class="w-full border-collapse">
            <thead>
              <tr class="bg-orange-500 text-white">
                <th class="p-4 text-left">Tanggal</th>

                <th class="p-4 text-left">Box</th>

                <th class="p-4 text-left">Lokasi</th>

                <th class="p-4 text-left">Petugas</th>

                <th class="p-4 text-left">Item</th>

                <th class="p-4 text-left">Aktual</th>

                <th class="p-4 text-left">Status</th>

                <th class="p-4 text-left">Foto</th>
              </tr>
            </thead>

            <tbody id="historyTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <script>
      if (localStorage.getItem("isLogin") != "true") {
        window.location.href = "login.html";
      }
    </script>

    <script>
      let allData = [];

      fetch(
        "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec",
      )
        .then((res) => res.json())

        .then((data) => {
          console.log(data);

          allData = data.reverse();

          renderTable(allData);
        });

      function renderTable(data) {
        const table = document.getElementById("historyTable");

        table.innerHTML = "";

        data.forEach((row) => {
          table.innerHTML += `

<tr class="border-b hover:bg-gray-50 transition">

<td class="p-4">

${new Date(row.date).toLocaleDateString("id-ID")}

</td>

<td class="p-4 font-bold">

${row.box}

</td>

<td class="p-4">

${row.location}

</td>

<td class="p-4">

${row.officer}

</td>

<td class="p-4">

${row.item}

</td>

<td class="p-4 font-bold">

${row.actual}

</td>

<td class="p-4">

<span class="
px-4 py-2 rounded-xl text-white font-semibold

${
  row.status == "Aman"
    ? "bg-green-500"
    : row.status == "Kurang"
      ? "bg-yellow-500"
      : "bg-red-500"
}
">

${row.status}

</span>

</td>

<td class="p-4">

${
  row.photo
    ? `
<a
href="${row.photo}"
target="_blank"
class="text-blue-500 underline font-semibold"
>
Lihat
</a>
`
    : "-"
}

</td>

</tr>

`;
        });
      }

      // SEARCH

      document
        .getElementById("searchBox")

        .addEventListener("input", (e) => {
          const keyword = e.target.value.toLowerCase();

          const filtered = allData.filter(
            (row) =>
              row.box.toLowerCase().includes(keyword) ||
              row.location.toLowerCase().includes(keyword) ||
              row.officer.toLowerCase().includes(keyword),
          );

          renderTable(filtered);
        });
    </script>
  </body>
</html>
