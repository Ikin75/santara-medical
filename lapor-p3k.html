<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lapor Pemakaian P3K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-xl mx-auto bg-white rounded-3xl shadow-xl p-8 mt-10">
      <div class="flex items-center gap-4 mb-8 pb-6 border-b border-gray-100">
        <a
          id="backBtn"
          href="#"
          class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center font-bold text-gray-500 hover:bg-gray-200 transition"
          >←</a
        >
        <h1 class="text-2xl font-black">Lapor Pemakaian P3K</h1>
      </div>

      <form id="laporForm" class="space-y-6">
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="font-bold text-sm text-gray-500 block mb-1"
              >Perusahaan</label
            >
            <input
              type="text"
              id="company"
              readonly
              class="w-full bg-gray-100 border border-gray-200 rounded-xl p-3 text-sm font-semibold text-gray-700 cursor-not-allowed outline-none"
            />
          </div>
          <div>
            <label class="font-bold text-sm text-gray-500 block mb-1"
              >Nomor Box</label
            >
            <input
              type="text"
              id="box"
              readonly
              class="w-full bg-gray-100 border border-gray-200 rounded-xl p-3 text-sm font-semibold text-gray-700 cursor-not-allowed outline-none"
            />
          </div>
        </div>

        <input type="hidden" id="location" />

        <div>
          <label class="font-bold mb-2 block text-gray-800"
            >Nama Lengkap Pekerja</label
          >
          <input
            type="text"
            id="nama"
            required
            placeholder="Contoh: Budi Santoso"
            class="w-full border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-orange-500 outline-none"
          />
        </div>

        <div>
          <label class="font-bold mb-2 block text-gray-800"
            >Departemen / Bagian</label
          >
          <input
            type="text"
            id="departemen"
            required
            placeholder="Contoh: Produksi, Gudang, Office"
            class="w-full border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-orange-500 outline-none"
          />
        </div>

        <div class="grid grid-cols-3 gap-4">
          <div class="col-span-2">
            <label class="font-bold mb-2 block text-gray-800"
              >Item yang Diambil</label
            >
            <select
              id="itemAmbil"
              required
              onchange="cekLainnya()"
              class="w-full border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-orange-500 outline-none bg-white cursor-pointer"
            >
              <option value="" disabled selected>-- Pilih Item --</option>
              <option value="Kassa steril">Kassa steril</option>
              <option value="Plester Cepat">Plester Cepat</option>
              <option value="Alkohol 70%">Alkohol 70%</option>
              <option value="Povidon iodin / Obat Merah">
                Povidon iodin / Obat Merah
              </option>
              <option value="Minyak Kayu Putih">Minyak Kayu Putih</option>
              <option value="Lainnya">Lainnya (Ketik Manual)</option>
            </select>
          </div>
          <div>
            <label class="font-bold mb-2 block text-gray-800">Jumlah</label>
            <input
              type="number"
              id="jumlah"
              min="1"
              required
              placeholder="1"
              class="w-full border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-orange-500 outline-none"
            />
          </div>
        </div>

        <div id="divLainnya" class="hidden animate-pulse">
          <label class="font-bold mb-2 block text-orange-500"
            >Tuliskan Nama Item Lainnya:</label
          >
          <input
            type="text"
            id="itemLainnya"
            placeholder="Ketik nama barang yang diambil..."
            class="w-full border-2 border-orange-200 bg-orange-50 rounded-xl p-4 focus:ring-2 focus:ring-orange-500 outline-none"
          />
        </div>

        <div>
          <label class="font-bold mb-2 block text-gray-800"
            >Keterangan / Alasan (Luka)</label
          >
          <textarea
            id="alasan"
            required
            rows="3"
            placeholder="Contoh: Tersayat pisau cutter saat memotong kardus."
            class="w-full border border-gray-200 rounded-xl p-4 focus:ring-2 focus:ring-orange-500 outline-none"
          ></textarea>
        </div>

        <button
          type="submit"
          class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-4 rounded-2xl font-bold text-lg shadow-xl shadow-orange-500/20 transform active:scale-95"
        >
          Kirim Laporan
        </button>
      </form>
    </div>

    <script>
      // WAJIB SAMAKAN DENGAN LINK GOOGLE SCRIPT MILIKMU
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbycb_RW6ZvWpsYk9ikKnR1xIblJ5rI_RGx_U-NaAnIPzgmQjqvk9v1xgXZ-zFG0uiA/exec";

      window.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        document.getElementById("company").value = params.get("company") || "-";
        document.getElementById("box").value = params.get("box") || "-";
        document.getElementById("location").value =
          params.get("location") || "-";

        // Link kembali ke portal
        document.getElementById("backBtn").href =
          "portal-p3k.html" + window.location.search;
      });

      // FUNGSI MEMUNCULKAN KOTAK KETIK MANUAL
      function cekLainnya() {
        const pilihan = document.getElementById("itemAmbil").value;
        const divLainnya = document.getElementById("divLainnya");
        const inputLainnya = document.getElementById("itemLainnya");

        if (pilihan === "Lainnya") {
          divLainnya.classList.remove("hidden");
          inputLainnya.setAttribute("required", "true");
        } else {
          divLainnya.classList.add("hidden");
          inputLainnya.removeAttribute("required");
          inputLainnya.value = ""; // Bersihkan jika batal pilih lainnya
        }
      }

      // PROSES KIRIM DATA
      document
        .getElementById("laporForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();
          const submitBtn = this.querySelector('button[type="submit"]');
          submitBtn.innerHTML = "⏳ Mengirim Laporan...";
          submitBtn.disabled = true;

          // Ambil nilai item (dari dropdown atau ketikan manual)
          let itemFinal = document.getElementById("itemAmbil").value;
          if (itemFinal === "Lainnya") {
            itemFinal = document.getElementById("itemLainnya").value;
          }

          const dataLapor = {
            type: "Lapor", // Penanda untuk Google Script
            company: document.getElementById("company").value,
            box: document.getElementById("box").value,
            location: document.getElementById("location").value,
            nama: document.getElementById("nama").value,
            departemen: document.getElementById("departemen").value,
            itemAmbil: itemFinal,
            jumlah: document.getElementById("jumlah").value,
            alasan: document.getElementById("alasan").value,
          };

          try {
            const response = await fetch(SCRIPT_URL, {
              method: "POST",
              headers: { "Content-Type": "text/plain;charset=utf-8" },
              body: JSON.stringify(dataLapor),
            });

            await response.text(); // Tunggu balasan dari server

            alert(
              "✅ Terima kasih! Laporan pemakaian berhasil dicatat di sistem.",
            );
            window.location.href = "portal-p3k.html" + window.location.search;
          } catch (err) {
            alert(
              "❌ Gagal mengirim laporan. Pastikan koneksi internet stabil.",
            );
            submitBtn.innerHTML = "Kirim Laporan";
            submitBtn.disabled = false;
          }
        });
    </script>
  </body>
</html>
