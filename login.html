<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login Admin</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
      <h1 class="text-5xl font-black mb-3">
        <span class="text-orange-500"> Santara </span>

        Login
      </h1>

      <p class="text-gray-500 mb-10">Login admin dashboard P3K</p>

      <div class="space-y-6">
        <input
          type="text"
          id="username"
          placeholder="Username"
          class="w-full border border-gray-200 rounded-2xl p-4"
        />

        <input
          type="password"
          id="password"
          placeholder="Password"
          class="w-full border border-gray-200 rounded-2xl p-4"
        />

        <button
          onclick="login()"
          class="w-full bg-orange-500 hover:bg-orange-600 transition text-white py-4 rounded-2xl font-bold text-xl"
        >
          Login
        </button>
      </div>
    </div>

    <script>
      function login() {
        const username = document.getElementById("username").value;

        const password = document.getElementById("password").value;

        // LOGIN SIMPLE
        if (username == "admin" && password == "123456") {
          localStorage.setItem("isLogin", "true");

          window.location.href = "dashboard-p3k.html";
        } else {
          alert("Username atau password salah!");
        }
      }
    </script>
  </body>
</html>
