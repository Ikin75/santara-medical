<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Artikel Santara</title>

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100">
    <section class="py-20 px-6">
      <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-14">
          <div>
            <h1 class="text-5xl font-extrabold mb-4">Artikel Kesehatan</h1>

            <p class="text-gray-600 text-lg">
              Edukasi kesehatan terpercaya dari Santara Medical.
            </p>
          </div>

          <a
            href="index.html"
            class="bg-orange-500 text-white px-6 py-3 rounded-xl"
          >
            ← Kembali
          </a>
        </div>

        <!-- SEARCH -->

        <div class="mb-10">
          <input
            type="text"
            id="searchInput"
            placeholder="Cari artikel..."
            class="w-full p-5 rounded-2xl border border-gray-200 shadow-lg"
          />
        </div>

        <!-- FILTER -->

        <div class="flex gap-4 flex-wrap mb-10">
          <button
            class="filter-btn bg-orange-500 text-white px-5 py-2 rounded-xl"
            data-category="All"
          >
            Semua
          </button>

          <button
            class="filter-btn bg-gray-200 px-5 py-2 rounded-xl"
            data-category="Kesehatan Kerja"
          >
            Kesehatan Kerja
          </button>

          <button
            class="filter-btn bg-gray-200 px-5 py-2 rounded-xl"
            data-category="Lifestyle"
          >
            Lifestyle
          </button>
        </div>

        <!-- FEATURED -->

        <div id="featuredArticle" class="mb-16"></div>

        <!-- ARTICLES -->

        <div
          id="articleContainer"
          class="grid md:grid-cols-2 lg:grid-cols-3 gap-10"
        ></div>

        <!-- PAGINATION -->

        <div id="pagination" class="flex justify-center gap-3 mt-16"></div>
      </div>
    </section>

    <script src="./js/articles.js"></script>
  </body>
</html>
