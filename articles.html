<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artikel Kesehatan - Santara Medical</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
      }
      .reveal {
        opacity: 0;
        transform: translateY(30px); /* Kurangi jarak transform */
        transition: all 0.6s ease-out; /* Percepat animasi */
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
      .zoom-wrapper {
        overflow: hidden;
      }
      .zoom-wrapper img {
        transition: transform 0.8s ease-out;
      }
      .zoom-wrapper:hover img {
        transform: scale(1.05);
      }
    </style>
  </head>

  <body
    class="bg-gray-50 dark:bg-[#0f0f0f] text-gray-800 dark:text-gray-200 transition-colors duration-300 relative min-h-screen"
  >
    <div class="fixed inset-0 overflow-hidden -z-10 pointer-events-none">
      <div
        class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-orange-500/10 blur-[120px] rounded-full"
      ></div>
    </div>

    <header class="pt-6 px-6 relative z-20">
      <div
        class="max-w-7xl mx-auto flex justify-between items-center border-b border-gray-200 dark:border-white/10 pb-4"
      >
        <a
          href="index.html"
          class="group flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:text-orange-500 font-medium transition-colors text-sm"
        >
          <span class="group-hover:-translate-x-1 transition-transform">←</span>
          Kembali
        </a>

        <div class="flex items-center gap-4">
          <div class="hidden sm:block text-lg font-bold">
            <span class="text-orange-500">Santara</span> Medical
          </div>

          <button
            id="darkToggle"
            class="w-10 h-10 rounded-xl bg-white dark:bg-[#151515] border border-gray-200 dark:border-white/10 flex items-center justify-center hover:text-orange-500 transition-colors shadow-sm"
          >
            🌙
          </button>
        </div>
      </div>
    </header>

    <section class="py-8 px-6 reveal active">
      <div class="max-w-7xl mx-auto">
        <div
          class="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-10"
        >
          <div class="lg:w-1/2">
            <h1
              class="text-3xl lg:text-4xl font-black mb-2 tracking-tight dark:text-white"
            >
              Artikel
              <span
                class="text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-orange-600"
                >Kesehatan</span
              >
            </h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm">
              Edukasi kesehatan terpercaya dari tenaga profesional.
            </p>
          </div>

          <div class="lg:w-1/2 relative group">
            <input
              type="text"
              id="searchInput"
              placeholder="Cari artikel (misal: 'Jantung', 'Gizi')..."
              class="w-full py-3.5 pl-5 pr-14 rounded-xl border border-gray-200 dark:border-white/10 dark:bg-[#151515] dark:text-white shadow-sm focus:outline-none focus:ring-2 focus:ring-orange-500/50 text-base transition-all"
            />
            <button
              id="searchBtn"
              class="absolute right-2 top-1/2 -translate-y-1/2 w-10 h-10 flex items-center justify-center bg-orange-50 dark:bg-orange-500/10 text-orange-500 rounded-lg hover:bg-orange-500 hover:text-white transition-colors cursor-pointer"
            >
              🔍
            </button>
          </div>
        </div>

        <div
          class="flex gap-3 flex-wrap mb-10 border-b border-gray-100 dark:border-white/5 pb-6"
          id="filterContainer"
        >
          <button
            class="filter-btn active bg-orange-500 text-white border border-transparent px-4 py-2 rounded-lg text-sm font-semibold shadow-md transition-colors"
            data-category="All"
          >
            Semua
          </button>
          <button
            class="filter-btn bg-white dark:bg-[#1f1f1f] text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 px-4 py-2 rounded-lg text-sm font-medium hover:bg-orange-50 dark:hover:bg-orange-500/10 hover:text-orange-500 transition-colors"
            data-category="Kesehatan Kerja"
          >
            Kesehatan Kerja
          </button>
          <button
            class="filter-btn bg-white dark:bg-[#1f1f1f] text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 px-4 py-2 rounded-lg text-sm font-medium hover:bg-orange-50 dark:hover:bg-orange-500/10 hover:text-orange-500 transition-colors"
            data-category="Lifestyle"
          >
            Lifestyle
          </button>
        </div>

        <div id="featuredArticle" class="mb-12"></div>

        <div
          id="articleContainer"
          class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"
        ></div>

        <div
          id="pagination"
          class="flex justify-center items-center gap-2 mt-12 pb-8"
        ></div>
      </div>
    </section>

    <script>
      // 1. DARK MODE TOGGLE
      const darkToggle = document.getElementById("darkToggle");
      if (localStorage.getItem("dark-mode") === "true") {
        document.documentElement.classList.add("dark");
      }
      darkToggle.addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
        localStorage.setItem(
          "dark-mode",
          document.documentElement.classList.contains("dark"),
        );
      });

      // 2. UI TOMBOL FILTER
      const filterBtns = document.querySelectorAll(".filter-btn");
      filterBtns.forEach((btn) => {
        btn.addEventListener("click", function () {
          // Reset semua
          filterBtns.forEach((b) => {
            b.className =
              "filter-btn bg-white dark:bg-[#1f1f1f] text-gray-600 dark:text-gray-300 border border-gray-200 dark:border-white/10 px-4 py-2 rounded-lg text-sm font-medium hover:bg-orange-50 dark:hover:bg-orange-500/10 hover:text-orange-500 transition-colors";
          });

          // Aktifkan yang diklik
          this.className =
            "filter-btn active bg-orange-500 text-white border border-transparent px-4 py-2 rounded-lg text-sm font-semibold shadow-md transition-colors";
        });
      });
    </script>

    <script src="./js/articles.js"></script>
  </body>
</html>
